<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 EasyPageX – Lunar Landing Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mars:    #E8531A;
    --crater:  #B03A10;
    --sky-top: #0A0014;
    --sky-mid: #1A0A3A;
    --neon-y:  #FFD600;
    --neon-c:  #00F5FF;
    --neon-g:  #39FF14;
    --neon-m:  #FF2D9B;
    --white:   #FFFFFF;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--sky-top);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── STARFIELD ─── */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ─── HEADER ─── */
  header {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem 1rem 0.5rem;
  }
  .logo-brand {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.65rem, 2vw, 0.9rem);
    letter-spacing: 0.35em;
    color: var(--neon-c);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.5rem, 6vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--neon-y) 0%, var(--neon-m) 50%, var(--neon-c) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 0.5rem;
  }
  .tagline {
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    color: #aaa;
    letter-spacing: 0.05em;
  }

  /* ─── GAME AREA ─── */
  #game-wrap {
    position: relative; z-index: 2;
    width: min(520px, 96vw);
    margin: 1.5rem auto 0;
  }

  #game-canvas {
    width: 100%;
    border-radius: 16px;
    border: 2px solid rgba(0,245,255,0.25);
    box-shadow:
      0 0 40px rgba(0,245,255,0.15),
      0 0 80px rgba(232,83,26,0.1);
    display: block;
    cursor: pointer;
  }

  /* ─── CONTROLS ─── */
  #controls {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .btn-game {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    font-weight: 700;
    padding: 0.7rem 1.6rem;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-game:active { transform: scale(0.96); }
  .btn-launch {
    background: linear-gradient(135deg, var(--mars), var(--neon-m));
    color: #fff;
    box-shadow: 0 0 20px rgba(255,45,155,0.5);
  }
  .btn-launch:hover { box-shadow: 0 0 32px rgba(255,45,155,0.8); transform: scale(1.04); }

  /* ─── STATUS ─── */
  #status-msg {
    text-align: center;
    min-height: 2.5rem;
    margin-top: 0.75rem;
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.75rem, 3vw, 1rem);
    letter-spacing: 0.05em;
    transition: opacity 0.3s;
  }

  /* ─── CTA BUTTON ─── */
  .cta-wrap {
    position: relative; z-index: 2;
    text-align: center;
    margin: 2rem auto 3rem;
  }
  .btn-order {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    text-decoration: none;
    padding: 1rem 2.8rem;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--neon-y), var(--neon-g));
    color: #000;
    box-shadow: 0 0 30px rgba(57,255,20,0.5), 0 0 60px rgba(255,214,0,0.3);
    transition: transform 0.15s, box-shadow 0.2s;
    animation: pulse-cta 2.5s ease-in-out infinite;
  }
  .btn-order:hover {
    transform: scale(1.07);
    box-shadow: 0 0 50px rgba(57,255,20,0.8), 0 0 80px rgba(255,214,0,0.5);
  }
  @keyframes pulse-cta {
    0%, 100% { box-shadow: 0 0 30px rgba(57,255,20,0.5), 0 0 60px rgba(255,214,0,0.3); }
    50%       { box-shadow: 0 0 50px rgba(57,255,20,0.8), 0 0 90px rgba(255,214,0,0.55); }
  }

  /* ─── OVERLAY MESSAGES ─── */
  #overlay {
    position: absolute; inset: 0;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 10;
  }
  #overlay.show { opacity: 1; }
  #overlay .ov-emoji { font-size: clamp(3rem, 12vw, 5rem); }
  #overlay .ov-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.1rem, 5vw, 2rem);
    font-weight: 900;
    text-align: center;
    text-shadow: 0 0 30px currentColor;
  }
  #overlay.success { background: radial-gradient(circle, rgba(57,255,20,0.35) 0%, rgba(0,0,0,0.65) 100%); color: var(--neon-g); }
  #overlay.crash   { background: radial-gradient(circle, rgba(255,80,0,0.45) 0%, rgba(0,0,0,0.7)  100%); color: var(--neon-y); }

  @media (prefers-reduced-motion: reduce) {
    .btn-order { animation: none; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <div class="logo-brand">EasyPageX</div>
  <h1>Lunar Landing<br>Game</h1>
  <p class="tagline">Can you touch down on Mars? 🎯</p>
</header>

<div id="game-wrap">
  <div style="position:relative;">
    <canvas id="game-canvas"></canvas>
    <div id="overlay">
      <span class="ov-emoji" id="ov-emoji"></span>
      <div class="ov-title" id="ov-title"></div>
    </div>
  </div>
  <div id="controls">
    <button class="btn-game btn-launch" id="btn-launch">🚀 LAUNCH</button>
  </div>
  <div id="status-msg"></div>
</div>

<div class="cta-wrap">
  <a class="btn-order" href="https://easypagex.github.io/48/" target="_blank" rel="noopener">
    🛒 ORDER HERE
  </a>
</div>

<!-- ─── STARFIELD ─── -->
<script>
(function() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize() {
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.5+0.3,
      a: Math.random(),
      s: Math.random()*0.008+0.002
    }));
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => {
      s.a += s.s; if(s.a > 1) s.a = 0;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.3 + s.a*0.7})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); draw();
  window.addEventListener('resize', resize);
})();
</script>

<!-- ─── GAME ENGINE ─── -->
<script>
(function() {
  const GC  = document.getElementById('game-canvas');
  const ctx = GC.getContext('2d');
  const W   = 520, H = 380;
  GC.width  = W; GC.height = H;

  const overlay   = document.getElementById('overlay');
  const ovEmoji   = document.getElementById('ov-emoji');
  const ovTitle   = document.getElementById('ov-title');
  const statusMsg = document.getElementById('status-msg');
  const btnLaunch = document.getElementById('btn-launch');

  /* ── CONSTANTS ── */
  const SHIP_W   = 52, SHIP_H = 52;
  const GROUND_Y = H - 60;
  const PAD_W    = 70,  PAD_H = 14;
  const GRAVITY  = 0.12;
  const SWING    = 2.6;   // horizontal speed
  const SHIP_EMOJI = '🚀';
  const MARS_EMOJI = '🪐';
  const COLORS = {
    skyTop : '#0A0014', skyBot : '#2A0A0A',
    surface: '#B03A10', crater : '#8B2B08',
    neonC  : '#00F5FF', neonY  : '#FFD600',
    neonG  : '#39FF14', neonM  : '#FF2D9B',
    padOn  : '#39FF14', padOff : '#FF2D9B',
  };

  /* ── STATE ── */
  let state   = 'idle'; // idle | swinging | falling | result
  let ship    = { x: W/2, y: 60, vy: 0 };
  let dir     = 1;
  let padX    = 0;
  let particles = [];
  let confetti  = [];
  let crashBits = [];
  let frame   = 0;

  function randomPad() {
    return 30 + Math.random() * (W - 30 - PAD_W - 30);
  }

  function reset() {
    ship = { x: W/2, y: 60, vy: 0 };
    dir  = 1;
    padX = randomPad();
    particles = []; confetti = []; crashBits = [];
    frame = 0;
    hideOverlay();
    statusMsg.innerHTML = `<span style="color:#00F5FF">🕹 Tap / Click to release the ship!</span>`;
    btnLaunch.textContent = '🚀 LAUNCH';
  }

  function hideOverlay() {
    overlay.className = '';
    overlay.classList.remove('show','success','crash');
  }

  function showOverlay(type, emoji, title) {
    overlay.className = '';
    ovEmoji.textContent  = emoji;
    ovTitle.textContent  = title;
    overlay.classList.add(type, 'show');
  }

  /* ── PARTICLES ── */
  function spawnConfetti(cx, cy) {
    const cols = ['#FFD600','#39FF14','#00F5FF','#FF2D9B','#FF6B00','#fff'];
    for(let i=0;i<80;i++) {
      confetti.push({
        x: cx, y: cy,
        vx: (Math.random()-0.5)*8,
        vy: (Math.random()-0.5)*8 - 3,
        r: Math.random()*6+3,
        color: cols[Math.floor(Math.random()*cols.length)],
        life: 1, decay: 0.012+Math.random()*0.012, rot: Math.random()*Math.PI*2, rs: (Math.random()-0.5)*0.3
      });
    }
  }

  function spawnCrash(cx, cy) {
    for(let i=0;i<60;i++) {
      const ang = Math.random()*Math.PI*2;
      const spd = 2 + Math.random()*6;
      crashBits.push({
        x: cx, y: cy,
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
        r: 2+Math.random()*5,
        color: ['#FF6B00','#FFD600','#FF2D9B','#fff'][Math.floor(Math.random()*4)],
        life: 1, decay: 0.018+Math.random()*0.015
      });
    }
  }

  /* ── DRAW ── */
  function drawBackground() {
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, COLORS.skyTop);
    grad.addColorStop(1, COLORS.skyBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
  }

  function drawMarsGround() {
    // surface gradient
    const sg = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    sg.addColorStop(0, '#D44E1A');
    sg.addColorStop(1, '#7A2008');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    // bumpy terrain
    ctx.lineTo(40,  GROUND_Y-8);
    ctx.lineTo(80,  GROUND_Y-3);
    ctx.lineTo(padX-2, GROUND_Y);  // landing zone flat
    ctx.lineTo(padX+PAD_W+2, GROUND_Y);
    ctx.lineTo(W-80, GROUND_Y-5);
    ctx.lineTo(W-40, GROUND_Y-12);
    ctx.lineTo(W,    GROUND_Y-4);
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // craters
    [[60,GROUND_Y-2,18],[W-70,GROUND_Y-2,22],[W/2+80,GROUND_Y-1,12]].forEach(([cx,cy,cr])=>{
      ctx.beginPath(); ctx.ellipse(cx,cy,cr,cr*0.4,0,0,Math.PI*2);
      ctx.fillStyle=COLORS.crater; ctx.fill();
    });

    // landing pad
    const padGrad = ctx.createLinearGradient(padX, GROUND_Y-PAD_H, padX, GROUND_Y);
    padGrad.addColorStop(0, state==='idle'||state==='swinging' ? COLORS.padOn : COLORS.padOff);
    padGrad.addColorStop(1, '#003300');
    ctx.fillStyle = padGrad;
    ctx.beginPath();
    ctx.roundRect(padX, GROUND_Y-PAD_H, PAD_W, PAD_H, 4);
    ctx.fill();
    // pad label
    ctx.fillStyle = '#000';
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('MARS BASE', padX+PAD_W/2, GROUND_Y-3);

    // neon edge glow on pad
    ctx.strokeStyle = state==='idle'||state==='swinging' ? COLORS.padOn : COLORS.neonM;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.roundRect(padX, GROUND_Y-PAD_H, PAD_W, PAD_H, 4);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawTrajectoryDots() {
    if(state !== 'swinging') return;
    ctx.fillStyle = 'rgba(0,245,255,0.35)';
    for(let t=1; t<=14; t+=2) {
      const dotX = ship.x + dir*SWING*t;
      const dotY = ship.y + 0.5*GRAVITY*t*t + 2;
      ctx.beginPath(); ctx.arc(dotX, dotY, 2, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawShip() {
    if(state==='result' && crashBits.length) return; // replaced by bits
    const bob = state==='swinging' ? Math.sin(frame*0.08)*4 : 0;
    ctx.save();
    ctx.font = `${SHIP_W}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // thruster glow when falling
    if(state==='falling') {
      ctx.shadowColor = '#FF6B00';
      ctx.shadowBlur = 20;
    }
    ctx.fillText(SHIP_EMOJI, ship.x, ship.y + bob);
    ctx.restore();
  }

  function drawParticles() {
    confetti.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r);
      ctx.restore();
    });
    crashBits.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawHUD() {
    // EasyPageX brand watermark
    ctx.font = '700 10px Orbitron, monospace';
    ctx.fillStyle = 'rgba(0,245,255,0.25)';
    ctx.textAlign = 'right';
    ctx.fillText('EasyPageX', W-8, H-8);
    // mars emoji decoration
    ctx.font = '28px serif';
    ctx.textAlign = 'left';
    ctx.globalAlpha = 0.18;
    ctx.fillText(MARS_EMOJI, 6, H-8);
    ctx.globalAlpha = 1;
  }

  function drawSwingerArm() {
    if(state !== 'swinging') return;
    const topX = W/2, topY = 10;
    const bob  = Math.sin(frame*0.08)*4;
    ctx.strokeStyle = 'rgba(0,245,255,0.4)';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(topX, topY);
    ctx.lineTo(ship.x, ship.y + bob);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  /* ── GAME LOOP ── */
  function tick() {
    frame++;
    ctx.clearRect(0,0,W,H);
    drawBackground();
    drawMarsGround();

    if(state === 'swinging') {
      // pendulum swing
      ship.x += dir * SWING;
      if(ship.x > W-SHIP_W/2 || ship.x < SHIP_W/2) dir *= -1;
      drawSwingerArm();
      drawTrajectoryDots();
      drawShip();
    } else if(state === 'falling') {
      ship.vy += GRAVITY;
      ship.y  += ship.vy;
      ship.x  += dir * (SWING * 0.6);
      // clamp horizontal
      if(ship.x < SHIP_W/2)      { ship.x = SHIP_W/2;      dir *= -1; }
      if(ship.x > W - SHIP_W/2)  { ship.x = W-SHIP_W/2;    dir *= -1; }
      drawShip();

      // hit ground?
      if(ship.y >= GROUND_Y - SHIP_H/2) {
        ship.y = GROUND_Y - SHIP_H/2;
        const cx = ship.x;
        const hit = cx >= padX && cx <= padX + PAD_W;
        state = 'result';
        if(hit) {
          spawnConfetti(cx, GROUND_Y);
          showOverlay('success','🎉','Mission Accomplished!');
          statusMsg.innerHTML = `<span style="color:#39FF14">✅ Perfect landing on Mars Base! Houston, we have touchdown!</span>`;
        } else {
          spawnCrash(cx, GROUND_Y);
          statusMsg.innerHTML = `<span style="color:#FFD600">💥 Crash! So close — try again, commander!</span>`;
          showOverlay('crash','💥','BOOM! CRASH!');
        }
        btnLaunch.textContent = '🔄 TRY AGAIN';
      }
    } else if(state === 'result') {
      if(!crashBits.length) drawShip();
      // update particles
      confetti.forEach(p => {
        p.x += p.vx; p.y += p.vy + 0.15; p.vy += 0.1;
        p.rot += p.rs; p.life -= p.decay;
      });
      confetti = confetti.filter(p => p.life > 0);
      crashBits.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= p.decay;
      });
      crashBits = crashBits.filter(p => p.life > 0);
    }

    drawParticles();
    drawHUD();
    requestAnimationFrame(tick);
  }

  /* ── INPUT ── */
  function handleInput() {
    if(state === 'idle') {
      state = 'swinging';
      btnLaunch.textContent = '🎯 RELEASE';
      statusMsg.innerHTML = `<span style="color:#FFD600">⏳ Watch the trajectory — tap to release!</span>`;
    } else if(state === 'swinging') {
      state = 'falling';
      statusMsg.innerHTML = `<span style="color:#FF2D9B">🔥 Falling… aim for the green pad!</span>`;
    } else if(state === 'result') {
      reset();
      state = 'swinging';
      btnLaunch.textContent = '🎯 RELEASE';
      statusMsg.innerHTML = `<span style="color:#FFD600">⏳ Watch the trajectory — tap to release!</span>`;
    }
  }

  GC.addEventListener('click', handleInput);
  btnLaunch.addEventListener('click', handleInput);
  // keyboard
  document.addEventListener('keydown', e => {
    if(e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); handleInput(); }
  });

  /* ── START ── */
  reset();
  state = 'idle';
  statusMsg.innerHTML = `<span style="color:#00F5FF">🕹 Tap the canvas or press LAUNCH to start!</span>`;
  tick();
})();
</script>
</body>
</html>
